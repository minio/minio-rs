name: MinIO Rust Library

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  RUST_LOG: debug
  CARGO_TERM_COLOR: always

jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Check format
      run: |
        cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install RDMA system deps (required by --all-features)
        run: |
          sudo apt-get -qy update
          sudo apt-get -qy install libibverbs-dev librdmacm-dev libnuma-dev
      - name: clippy
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings
  test-multi-thread:
    runs-on: ubuntu-latest
    # AIStor requires a valid license for ALL S3 operations. The secret is
    # withheld from PRs originating in forks, so these server-backed tests
    # cannot pass there until fork handling is decided (see start-server.sh,
    # which fails fast when no valid license is present).
    env:
      MINIO_LICENSE: ${{ secrets.AISTOR_LICENSE }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          ./tests/start-server.sh
          export SERVER_ENDPOINT=localhost:9000
          export ACCESS_KEY=minioadmin
          export SECRET_KEY=minioadmin
          export ENABLE_HTTPS=1
          export SERVER_REGION=us-east-1
          export MINIO_SSL_CERT_FILE=./tests/public.crt
          MINIO_TEST_TOKIO_RUNTIME_FLAVOR="multi_thread" cargo test -- --nocapture
  test-current-thread:
    runs-on: ubuntu-latest
    env:
      MINIO_LICENSE: ${{ secrets.AISTOR_LICENSE }}
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: |
          ./tests/start-server.sh
          export SERVER_ENDPOINT=localhost:9000
          export ACCESS_KEY=minioadmin
          export SECRET_KEY=minioadmin
          export ENABLE_HTTPS=1
          export SERVER_REGION=us-east-1
          export MINIO_SSL_CERT_FILE=./tests/public.crt
          MINIO_TEST_TOKIO_RUNTIME_FLAVOR="current_thread" cargo test -- --nocapture

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        cargo --version
        cargo build --bins --examples --tests --benches --verbose
